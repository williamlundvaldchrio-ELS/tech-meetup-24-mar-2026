<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style D — Cream Editorial</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400&family=Work+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #faf8f4;
            --text: #1a1612;
            --text-muted: #7a7168;
            --accent: #c87941;
            --accent-light: rgba(200, 121, 65, 0.12);
            --rule-color: #d8d0c6;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        .slide {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            position: relative;
            font-family: 'Work Sans', sans-serif;
            color: var(--text);
        }

        /* Grain texture */
        .slide::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        /* Horizontal rules — editorial register lines */
        .h-rule {
            position: absolute;
            left: clamp(2rem, 5vw, 5rem);
            right: clamp(2rem, 5vw, 5rem);
            height: 1px;
            background: var(--rule-color);
            z-index: 0;
        }

        .h-rule.top {
            top: clamp(2rem, 5vh, 4rem);
        }

        .h-rule.bottom {
            bottom: clamp(2rem, 5vh, 4rem);
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: min(85vw, 700px);
        }

        .overline {
            font-family: 'Work Sans', sans-serif;
            font-weight: 600;
            font-size: clamp(0.58rem, 1vw, 0.78rem);
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: clamp(1.2rem, 3vh, 2.5rem);
            opacity: 0;
            animation: fadeUp 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h1 {
            font-family: 'Fraunces', serif;
            font-weight: 900;
            font-size: clamp(2.8rem, 8vw, 6.5rem);
            line-height: 1.0;
            color: var(--text);
            margin-bottom: clamp(0.4rem, 1vh, 0.8rem);
            opacity: 0;
            animation: fadeUp 1s 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h1 em {
            font-style: italic;
            font-weight: 400;
            color: var(--accent);
        }

        /* Orange underline beneath title */
        .accent-bar {
            width: clamp(50px, 10vw, 100px);
            height: clamp(3px, 0.4vw, 5px);
            background: var(--accent);
            margin: clamp(0.8rem, 2vh, 1.5rem) auto;
            border-radius: 2px;
            opacity: 0;
            animation: fadeWidth 0.8s 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .subtitle {
            font-family: 'Work Sans', sans-serif;
            font-weight: 300;
            font-size: clamp(0.88rem, 1.8vw, 1.2rem);
            color: var(--text-muted);
            line-height: 1.65;
            max-width: 34ch;
            margin: 0 auto;
            opacity: 0;
            animation: fadeUp 0.8s 1.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Corner marks — editorial crop marks */
        .crop {
            position: absolute;
            width: clamp(18px, 2.5vw, 30px);
            height: clamp(18px, 2.5vw, 30px);
            border-color: var(--rule-color);
            border-style: solid;
            opacity: 0;
            animation: fadeIn 0.5s 1.4s ease forwards;
        }

        .crop.tl {
            top: clamp(1.5rem, 4vh, 3.5rem);
            left: clamp(1.5rem, 4vw, 3.5rem);
            border-width: 1px 0 0 1px;
        }

        .crop.tr {
            top: clamp(1.5rem, 4vh, 3.5rem);
            right: clamp(1.5rem, 4vw, 3.5rem);
            border-width: 1px 1px 0 0;
        }

        .crop.bl {
            bottom: clamp(1.5rem, 4vh, 3.5rem);
            left: clamp(1.5rem, 4vw, 3.5rem);
            border-width: 0 0 1px 1px;
        }

        .crop.br {
            bottom: clamp(1.5rem, 4vh, 3.5rem);
            right: clamp(1.5rem, 4vw, 3.5rem);
            border-width: 0 1px 1px 0;
        }

        /* Bottom metadata */
        .meta {
            position: absolute;
            bottom: clamp(1.2rem, 3vh, 2.5rem);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: clamp(0.8rem, 2vw, 2rem);
            z-index: 2;
            opacity: 0;
            animation: fadeIn 0.5s 1.6s ease forwards;
        }

        .meta span {
            font-size: clamp(0.52rem, 0.85vw, 0.68rem);
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .meta .dot {
            color: var(--accent);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fadeWidth {
            from {
                opacity: 0;
                width: 0;
            }

            to {
                opacity: 1;
                width: clamp(50px, 10vw, 100px);
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.2s !important;
            }
        }
    </style>
</head>

<body>
    <section class="slide">
        <div class="h-rule top"></div>
        <div class="h-rule bottom"></div>
        <div class="crop tl"></div>
        <div class="crop tr"></div>
        <div class="crop bl"></div>
        <div class="crop br"></div>

        <div class="content">
            <p class="overline">Show & Learn · March 2026</p>
            <h1>Vibe <em>Coding</em></h1>
            <div class="accent-bar"></div>
            <p class="subtitle">How to let the agent do your job — without hitting the rate limit.</p>
        </div>

        <div class="meta">
            <span>William Lundvald</span>
            <span class="dot">·</span>
            <span>Frontend Engineering</span>
        </div>
    </section>
</body>

</html>
