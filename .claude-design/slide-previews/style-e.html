<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style E — Warm Broadsheet</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400&family=Work+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #ffffff;
            --text: #1a1612;
            --text-muted: #8a8076;
            --accent: #c87941;
            --accent-pale: #f3e6d8;
            --border: #e4ddd4;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        .slide {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr clamp(280px, 40vw, 480px);
            background: var(--bg);
            position: relative;
            font-family: 'Work Sans', sans-serif;
            color: var(--text);
        }

        /* Left panel — text */
        .left {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: clamp(2rem, 5vw, 5rem);
            padding-right: clamp(1.5rem, 3vw, 3rem);
            border-right: 1px solid var(--border);
            position: relative;
        }

        .issue-tag {
            font-family: 'Work Sans', sans-serif;
            font-weight: 600;
            font-size: clamp(0.55rem, 0.9vw, 0.72rem);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: clamp(1.5rem, 3vh, 3rem);
            opacity: 0;
            animation: fadeLeft 0.7s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h1 {
            font-family: 'Fraunces', serif;
            font-weight: 900;
            font-size: clamp(2.4rem, 6vw, 5rem);
            line-height: 1.0;
            color: var(--text);
            margin-bottom: clamp(1rem, 2.5vh, 2rem);
            opacity: 0;
            animation: fadeLeft 1s 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h1 em {
            font-style: italic;
            font-weight: 400;
            display: block;
            color: var(--accent);
            font-size: 0.85em;
        }

        .rule {
            width: clamp(30px, 5vw, 50px);
            height: 2px;
            background: var(--accent);
            margin-bottom: clamp(0.8rem, 2vh, 1.5rem);
            opacity: 0;
            animation: fadeWidth 0.5s 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .subtitle {
            font-weight: 300;
            font-size: clamp(0.85rem, 1.5vw, 1.1rem);
            color: var(--text-muted);
            line-height: 1.65;
            max-width: 30ch;
            opacity: 0;
            animation: fadeLeft 0.8s 1.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Right panel — accent block */
        .right {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-pale);
            position: relative;
            overflow: hidden;
        }

        /* Abstract shapes in the right panel */
        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: shapeReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .shape-1 {
            width: clamp(180px, 28vw, 350px);
            height: clamp(180px, 28vw, 350px);
            background: var(--accent);
            opacity: 0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 0.4s;
        }

        .shape-2 {
            width: clamp(100px, 16vw, 200px);
            height: clamp(100px, 16vw, 200px);
            border: 2px solid var(--accent);
            background: transparent;
            top: 15%;
            right: 10%;
            animation-delay: 0.7s;
        }

        .shape-3 {
            width: clamp(60px, 10vw, 120px);
            height: clamp(60px, 10vw, 120px);
            background: rgba(200, 121, 65, 0.3);
            bottom: 18%;
            left: 12%;
            animation-delay: 1.0s;
        }

        /* Vertical text in right panel */
        .vertical-label {
            position: absolute;
            bottom: clamp(1.5rem, 3vh, 3rem);
            right: clamp(1.5rem, 3vw, 2.5rem);
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-weight: 500;
            font-size: clamp(0.55rem, 0.85vw, 0.7rem);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            opacity: 0;
            animation: fadeIn 0.5s 1.4s ease forwards;
            z-index: 2;
        }

        /* Bottom-left meta */
        .meta {
            position: absolute;
            bottom: clamp(1.2rem, 2.5vh, 2rem);
            left: clamp(2rem, 5vw, 5rem);
            font-size: clamp(0.52rem, 0.8vw, 0.65rem);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            z-index: 2;
            opacity: 0;
            animation: fadeIn 0.5s 1.5s ease forwards;
        }

        @keyframes fadeLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fadeWidth {
            from {
                opacity: 0;
                width: 0;
            }

            to {
                opacity: 1;
                width: clamp(30px, 5vw, 50px);
            }
        }

        @keyframes shapeReveal {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.7);
            }

            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* Fix non-centered shapes */
        .shape-2,
        .shape-3 {
            animation-name: shapeRevealAlt;
        }

        @keyframes shapeRevealAlt {
            from {
                opacity: 0;
                transform: scale(0.7);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 700px) {
            .slide {
                grid-template-columns: 1fr;
            }

            .right {
                display: none;
            }

            .left {
                border-right: none;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.2s !important;
            }
        }
    </style>
</head>

<body>
    <section class="slide">
        <div class="left">
            <p class="issue-tag">Show & Learn · Issue No. 01</p>
            <h1>Vibe<br><em>Coding</em></h1>
            <div class="rule"></div>
            <p class="subtitle">How to let the agent do your job — without hitting the rate limit.</p>
        </div>

        <div class="right">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
            <span class="vertical-label">March 2026</span>
        </div>

        <p class="meta">William Lundvald · Frontend Engineering</p>
    </section>
</body>

</html>
