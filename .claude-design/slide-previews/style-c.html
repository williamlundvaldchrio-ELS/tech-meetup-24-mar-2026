<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style C — Dark Ember</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #141210;
            --bg-card: #1e1c18;
            --text: #e8e0d4;
            --text-muted: #8a8278;
            --accent: #e07a3a;
            --accent-soft: rgba(224, 122, 58, 0.12);
            --amber-glow: rgba(224, 122, 58, 0.08);
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        .slide {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            position: relative;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
        }

        /* Subtle warm gradient orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: clamp(200px, 40vw, 500px);
            height: clamp(200px, 40vw, 500px);
            background: var(--amber-glow);
            top: -10%;
            right: -5%;
            animation: drift 12s ease-in-out infinite alternate;
        }

        .orb-2 {
            width: clamp(150px, 30vw, 350px);
            height: clamp(150px, 30vw, 350px);
            background: rgba(180, 100, 50, 0.06);
            bottom: -5%;
            left: 10%;
            animation: drift 10s 2s ease-in-out infinite alternate-reverse;
        }

        /* Horizontal thin rules across the viewport */
        .h-rule {
            position: absolute;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(232, 224, 212, 0.06) 20%, rgba(232, 224, 212, 0.06) 80%, transparent);
            pointer-events: none;
            z-index: 0;
        }

        .h-rule.top {
            top: clamp(50px, 10vh, 80px);
        }

        .h-rule.bottom {
            bottom: clamp(50px, 10vh, 80px);
        }

        /* Content card with subtle border */
        .card {
            position: relative;
            z-index: 2;
            background: var(--bg-card);
            border: 1px solid rgba(232, 224, 212, 0.06);
            border-radius: clamp(8px, 1vw, 16px);
            padding: clamp(2rem, 5vw, 4.5rem);
            max-width: min(88vw, 720px);
            text-align: center;
            opacity: 0;
            animation: cardReveal 1.2s 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Accent glow behind card */
        .card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            background: linear-gradient(135deg, var(--accent-soft) 0%, transparent 40%, transparent 60%, var(--accent-soft) 100%);
            z-index: -1;
            opacity: 0;
            animation: fadeIn 1.5s 0.8s ease forwards;
        }

        .eyebrow {
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: clamp(0.6rem, 1vw, 0.78rem);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: clamp(1rem, 2.5vh, 2rem);
            opacity: 0;
            animation: fadeUp 0.7s 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(2.4rem, 7vw, 5.5rem);
            line-height: 1.05;
            color: var(--text);
            margin-bottom: clamp(0.6rem, 1.5vh, 1.2rem);
            opacity: 0;
            animation: fadeUp 1s 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h1 .italic {
            font-style: italic;
            font-weight: 400;
            color: var(--accent);
        }

        .separator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(8px, 1.2vw, 16px);
            margin: clamp(0.8rem, 2vh, 1.5rem) auto;
            opacity: 0;
            animation: fadeIn 0.6s 1.1s ease forwards;
        }

        .separator .line {
            width: clamp(20px, 4vw, 40px);
            height: 1px;
            background: var(--accent);
        }

        .separator .diamond {
            width: clamp(5px, 0.6vw, 7px);
            height: clamp(5px, 0.6vw, 7px);
            background: var(--accent);
            transform: rotate(45deg);
        }

        .subtitle {
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            font-size: clamp(0.82rem, 1.6vw, 1.15rem);
            color: var(--text-muted);
            line-height: 1.65;
            max-width: 34ch;
            margin: 0 auto;
            opacity: 0;
            animation: fadeUp 0.8s 1.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Footer metadata */
        .footer {
            position: absolute;
            bottom: clamp(1rem, 3vh, 2.5rem);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: clamp(1rem, 3vw, 2.5rem);
            z-index: 2;
            opacity: 0;
            animation: fadeIn 0.5s 1.6s ease forwards;
        }

        .footer span {
            font-size: clamp(0.52rem, 0.8vw, 0.65rem);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .footer .sep {
            color: var(--accent);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(12px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes drift {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(20px, -15px);
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.2s !important;
            }
        }
    </style>
</head>

<body>
    <section class="slide">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="h-rule top"></div>
        <div class="h-rule bottom"></div>

        <div class="card">
            <p class="eyebrow">Show & Learn · March 2026</p>
            <h1>Vibe <span class="italic">Coding</span></h1>
            <div class="separator">
                <span class="line"></span>
                <span class="diamond"></span>
                <span class="line"></span>
            </div>
            <p class="subtitle">How to let the agent do your job — without hitting the rate limit.</p>
        </div>

        <div class="footer">
            <span>William Lundvald</span>
            <span class="sep">◆</span>
            <span>Frontend Engineering</span>
        </div>
    </section>
</body>

</html>
