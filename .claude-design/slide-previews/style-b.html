<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style B — Studio Terracotta</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #faf7f2;
            --text: #1a1714;
            --text-muted: #7a746c;
            --accent: #d4763c;
            --accent-light: #e8a87c;
            --rule: #d4cfc7;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        .slide {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: grid;
            grid-template-columns: clamp(60px, 8vw, 100px) 1fr clamp(60px, 8vw, 100px);
            grid-template-rows: 1fr;
            background: var(--bg);
            position: relative;
            font-family: 'Instrument Sans', sans-serif;
            color: var(--text);
        }

        /* Left sidebar — burnt orange strip */
        .sidebar-left {
            background: var(--accent);
            display: flex;
            align-items: flex-end;
            padding-bottom: clamp(1rem, 3vh, 2rem);
            justify-content: center;
            position: relative;
        }

        .sidebar-left .number {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 800;
            font-size: clamp(0.9rem, 1.5vw, 1.2rem);
            color: var(--bg);
            letter-spacing: 0.05em;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            opacity: 0;
            animation: fadeIn 0.6s 0.8s ease forwards;
        }

        /* Right sidebar — thin rule with section indicator */
        .sidebar-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-left: 1px solid var(--rule);
            position: relative;
        }

        .sidebar-right .dots {
            display: flex;
            flex-direction: column;
            gap: clamp(6px, 1vh, 10px);
            opacity: 0;
            animation: fadeIn 0.5s 1.2s ease forwards;
        }

        .sidebar-right .dot {
            width: clamp(5px, 0.6vw, 8px);
            height: clamp(5px, 0.6vw, 8px);
            border-radius: 50%;
            background: var(--rule);
            transition: all 0.3s ease;
        }

        .sidebar-right .dot.active {
            background: var(--accent);
            transform: scale(1.4);
        }

        /* Main content area */
        .main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: clamp(2rem, 5vw, 5rem);
            position: relative;
        }

        .tag {
            display: inline-block;
            font-weight: 600;
            font-size: clamp(0.55rem, 0.9vw, 0.72rem);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            border: 1.5px solid var(--accent);
            padding: clamp(3px, 0.4vh, 6px) clamp(8px, 1vw, 14px);
            border-radius: 2px;
            margin-bottom: clamp(1.2rem, 3vh, 2.5rem);
            width: fit-content;
            opacity: 0;
            animation: fadeLeft 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h1 {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 800;
            font-size: clamp(2.5rem, 6.5vw, 5rem);
            line-height: 1.0;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-bottom: clamp(1rem, 2.5vh, 2rem);
            opacity: 0;
            animation: fadeUp 1s 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h1 .highlight {
            color: var(--accent);
            position: relative;
        }

        /* Underline accent on "Coding" */
        h1 .highlight::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: clamp(2px, 0.3vw, 5px);
            width: 100%;
            height: clamp(3px, 0.4vw, 5px);
            background: var(--accent-light);
            opacity: 0.5;
            border-radius: 2px;
        }

        .divider {
            width: clamp(30px, 5vw, 50px);
            height: 2px;
            background: var(--text);
            margin-bottom: clamp(0.8rem, 2vh, 1.5rem);
            opacity: 0;
            animation: fadeWidth2 0.6s 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .subtitle {
            font-weight: 400;
            font-size: clamp(0.85rem, 1.6vw, 1.15rem);
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 38ch;
            opacity: 0;
            animation: fadeUp 0.8s 1.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Bottom bar */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: clamp(36px, 5vh, 52px);
            background: var(--text);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 clamp(1rem, 3vw, 2rem);
            z-index: 5;
            opacity: 0;
            animation: slideUp 0.6s 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .bottom-bar span {
            font-size: clamp(0.55rem, 0.85vw, 0.7rem);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--bg);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeLeft {
            from {
                opacity: 0;
                transform: translateX(-16px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(100%);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fadeWidth2 {
            from {
                opacity: 0;
                width: 0;
            }

            to {
                opacity: 1;
                width: clamp(30px, 5vw, 50px);
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.2s !important;
            }
        }
    </style>
</head>

<body>
    <section class="slide">
        <div class="sidebar-left">
            <span class="number">01 / 08</span>
        </div>

        <div class="main">
            <div class="tag">Show & Learn</div>
            <h1>Vibe<br><span class="highlight">Coding</span></h1>
            <div class="divider"></div>
            <p class="subtitle">How to let the agent do your job — without hitting the rate limit.</p>
        </div>

        <div class="sidebar-right">
            <div class="dots">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <div class="bottom-bar">
            <span>William Lundvald</span>
            <span>March 2026</span>
        </div>
    </section>
</body>

</html>
